<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fallback UI</title>
    <style>
        .webgl-fallback {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #2e1065 0%, #000000 100%);
            overflow: hidden;
        }

        .webgl-fallback::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150vw;
            height: 150vw;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(107, 33, 168, 0.3) 0%, rgba(219, 39, 119, 0.2) 30%, rgba(249, 115, 22, 0.1) 60%, transparent 80%);
            animation: pulse 8s ease-in-out infinite;
            filter: blur(60px);
        }

        .webgl-fallback::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.15;
            mix-blend-mode: overlay;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.8;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="webgl-fallback" aria-hidden="true"></div>
</body>

</html>
