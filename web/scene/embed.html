<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Embed: Vanilla JS</title>
    <!-- Import Three.js (Required Dependency) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>

<body>
    <div id="bg-container" style="position: fixed; inset: 0; z-index: -1;"></div>

    <script type="module">
        import { WebGLBackground } from './scene.js';

        const container = document.getElementById('bg-container');

        // Check for WebGL support
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl2');

        if (gl) {
            const bg = new WebGLBackground(container);
            bg.init();
        } else {
            // Inject fallback
            container.innerHTML = `
                <div style="width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #2e1065 0%, #000000 100%);"></div>
            `;
        }
    </script>
</body>

</html>
