<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL Background Test Harness</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #canvas-container { position: fixed; inset: 0; }
        #stats {
            position: fixed; top: 10px; left: 10px;
            background: rgba(0,0,0,0.8); color: lime;
            font-family: monospace; padding: 10px;
            pointer-events: none; z-index: 100;
        }
    </style>
    <!-- Import Three.js Map (Simple quick import for test) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="stats">Initializing...</div>
    <div id="canvas-container"></div>

    <script type="module">
        import { WebGLBackground } from './scene.js';

        const stats = document.getElementById('stats');
        let startTime = performance.now();
        let frames = 0;
        let minFps = Infinity;
        let maxFps = 0;

        try {
            const bg = new WebGLBackground('#canvas-container');
            
            // Measure Init Time
            const t0 = performance.now();
            bg.init();
            const initTime = performance.now() - t0;
            console.log(`Init Time: ${initTime.toFixed(2)}ms`);

            // Performance Loop
            setInterval(() => {
                const now = performance.now();
                const elapsed = now - startTime;
                if (elapsed >= 1000) {
                    const fps = Math.round((frames * 1000) / elapsed);
                    if (fps > 0) { // Ignore init spike
                        minFps = Math.min(minFps, fps);
                        maxFps = Math.max(maxFps, fps);
                    }
                    
                    stats.innerHTML = `
                        FPS: ${fps}<br>
                        Min: ${minFps}<br>
                        Max: ${maxFps}<br>
                        Init: ${initTime.toFixed(2)}ms<br>
                        Res: ${window.innerWidth}x${window.innerHeight} (DPR: ${window.devicePixelRatio})
                    `;
                    
                    console.log(`PERF_METRIC: FPS=${fps} FRAME_TIME=${(1000/fps).toFixed(2)}ms`);
                    
                    frames = 0;
                    startTime = now;
                }
            }, 1000);

            // Hook into animation loop for frame counting
            const originalUpdate = bg.update.bind(bg);
            bg.update = function() {
                frames++;
                originalUpdate();
            };

        } catch (e) {
            stats.style.color = 'red';
            stats.innerHTML = `ERROR: ${e.message}`;
            console.error(e);
        }
    </script>
</body>
</html>
