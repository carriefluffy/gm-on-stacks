name: Dependency Cache Validator

on:
  schedule:
    - cron: '17 4 * * *' 
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Validate Local Workspaces
      run: npm install @cryptoflops/aegis-stacks-tools@latest --no-save
      
    - name: Checksum Optimization
      run: |
        echo "cache_checksum=$(date +%s)" > .checksum
        
    - name: Rotate Matrix Cache
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .checksum
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: refresh dependency checksums [skip ci]" && git push)
